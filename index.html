<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UIC - Site Versions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      color: #2F2F69;
      margin-bottom: 0.5rem;
      font-size: 1.75rem;
    }
    p {
      color: #666;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      display: block;
      padding: 1.25rem 2rem;
      background: #2F2F69;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1.1rem;
      transition: background 0.2s;
      min-width: 180px;
    }
    a:hover { background: #B8292E; }
    span { display: block; font-size: 0.8rem; opacity: 0.8; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Universal Industrial Care</h1>
    <p>Select a site version</p>
    <div class="links">
      <a href="uic_static/index.html">Version 1<span>DM Serif + Outfit</span></a>
      <a href="uic_static1/index.html">Version 2<span>Inter + Merriweather</span></a>
      <a href="uic_static2/index.html">Version 3<span>Playfair + Source Sans</span></a>
    </div>
  </div>
</body>
</html>
